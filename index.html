<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STORM Perfume</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a0a0a;
  color:white;
  transition:0.3s;
}

body.light {
  background:#ffffff;
  color:#000;
}

header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:#000;
}

body.light header {
  background:#ddd;
}

header h1 {
  color:#1e90ff;
}

nav a {
  color:inherit;
  margin-left:20px;
  text-decoration:none;
}

button.theme {
  padding:8px 12px;
  background:#1e90ff;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:5px;
}

.hero {
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(#000,#001f3f);
  text-align:center;
}

.hero button {
  margin-top:20px;
  padding:12px 25px;
  background:#1e90ff;
  border:none;
  color:white;
  border-radius:5px;
  cursor:pointer;
}
</style>

<script>
function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>

</head>

<body>

<header>
  <h1>STORM</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
  </nav>

  <button class="theme" onclick="toggleTheme()">🌙 / ☀️</button>
</header>

<section class="hero">
  <h2>Luxury Perfume Brand</h2>
  <p>Discover STORM Collection</p>

  <a href="products.html">
    <button>View Products</button>
  </a>
</section>

</body>
</html>
