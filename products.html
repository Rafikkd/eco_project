<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a0a0a;
  color:white;
  transition:0.3s;
}

body.light {
  background:#fff;
  color:#000;
}

header {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:#000;
}

body.light header {
  background:#ddd;
}

header h1 { color:#1e90ff; }

nav a {
  color:inherit;
  margin-left:20px;
  text-decoration:none;
}

.theme {
  padding:8px 12px;
  background:#1e90ff;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:5px;
}

.categories {
  text-align:center;
  padding:30px;
}

.categories button {
  margin:10px;
  padding:10px 20px;
  background:#1e90ff;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:5px;
}

.products {
  display:none;
  padding:40px;
}

.active {
  display:block;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:#111;
  padding:15px;
  border-radius:10px;
}

body.light .card {
  background:#eee;
}

.card img {
  width:100%;
  border-radius:10px;
}

select {
  width:100%;
  padding:8px;
  margin:10px 0;
}

button.order {
  width:100%;
  padding:10px;
  background:#1e90ff;
  border:none;
  color:white;
  cursor:pointer;
}
</style>

<script>
function toggleTheme(){
  document.body.classList.toggle("light");
}

function showCategory(id){
  document.querySelectorAll(".products").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goOrder(product, selectId){
  let size = document.getElementById(selectId).value;
  window.location.href = `order.html?product=${product}&size=${size}`;
}
</script>

</head>

<body>

<header>
  <h1>STORM</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
  </nav>

  <button class="theme" onclick="toggleTheme()">🌙 / ☀️</button>
</header>

<div class="categories">
  <h2>Choose Category</h2>

  <button onclick="showCategory('men')">Men</button>
  <button onclick="showCategory('women')">Women</button>
  <button onclick="showCategory('unisex')">Unisex</button>
</div>

<!-- MEN -->
<div id="men" class="products active">
  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/250">
      <h3>STORM - Black Power</h3>

      <p>🔥 Strong masculine scent for confident men</p>

      <select id="m1">
        <option>100ml - 4500 DA</option>
        <option>50ml - 3000 DA</option>
        <option>30ml - 2000 DA</option>
      </select>

      <button class="order" onclick="goOrder('STORM Black Power','m1')">Order</button>
    </div>

  </div>
</div>

<!-- WOMEN -->
<div id="women" class="products">
  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/250">
      <h3>STORM - Rose Beauty</h3>

      <p>🌸 Elegant feminine fragrance full of charm</p>

      <select id="w1">
        <option>100ml - 4000 DA</option>
        <option>50ml - 2700 DA</option>
        <option>30ml - 1700 DA</option>
      </select>

      <button class="order" onclick="goOrder('STORM Rose Beauty','w1')">Order</button>
    </div>

  </div>
</div>

<!-- UNISEX -->
<div id="unisex" class="products">
  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/250">
      <h3>STORM - Amber Gold</h3>

      <p>✨ Perfect balance for men & women</p>

      <select id="u1">
        <option>100ml - 4300 DA</option>
        <option>50ml - 2900 DA</option>
        <option>30ml - 1900 DA</option>
      </select>

      <button class="order" onclick="goOrder('STORM Amber Gold','u1')">Order</button>
    </div>

  </div>
</div>

</body>
</html>
