<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a0a0a;
  color:white;
  transition:0.3s;
}

body.light {
  background:#fff;
  color:#000;
}

header {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:#000;
}

body.light header { background:#ddd; }

header h1 { color:#1e90ff; }

nav a {
  color:inherit;
  margin-left:20px;
  text-decoration:none;
}

.theme {
  padding:8px 12px;
  background:#1e90ff;
  border:none;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

/* SOCIAL */
.container {
  text-align:center;
  padding:60px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:40px;
}

.card {
  background:#111;
  padding:30px;
  border-radius:10px;
  transition:0.3s;
}

body.light .card {
  background:#eee;
}

.card:hover {
  transform:translateY(-10px);
}

.icon {
  font-size:40px;
  margin-bottom:10px;
}

button {
  margin-top:10px;
  padding:10px;
  width:100%;
  background:#1e90ff;
  border:none;
  color:white;
  border-radius:5px;
  cursor:pointer;
}
</style>

<script>
function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>

</head>

<body>

<header>
  <h1>STORM</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
  </nav>
  <button class="theme" onclick="toggleTheme()">🌙 / ☀️</button>
</header>

<div class="container">
  <h2>Follow Us</h2>

  <div class="grid">

    <div class="card">
      <div class="icon">📸</div>
      <h3>Instagram</h3>
      <a href="#"><button>Visit</button></a>
    </div>

    <div class="card">
      <div class="icon">📘</div>
      <h3>Facebook</h3>
      <a href="#"><button>Visit</button></a>
    </div>

    <div class="card">
      <div class="icon">🎵</div>
      <h3>TikTok</h3>
      <a href="#"><button>Visit</button></a>
    </div>

    <div class="card">
      <div class="icon">▶️</div>
      <h3>YouTube</h3>
      <a href="#"><button>Visit</button></a>
    </div>

  </div>
</div>

</body>
</html>
